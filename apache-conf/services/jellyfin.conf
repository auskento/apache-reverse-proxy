# Jellyfin Reverse Proxy Configuration
<Location /jellyfin>
    ProxyPass http://jellyfin:8096/jellyfin
    ProxyPassReverse http://jellyfin:8096/jellyfin
    
    # Jellyfin-specific settings
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    
    # Required for video streaming
</Location>

<Location /jellyfin/socket.io>
    ProxyPass ws://jellyfin:8096/jellyfin/socket.io
    ProxyPassReverse ws://jellyfin:8096/jellyfin/socket.io
</Location>

<Location /jellyfin/static>
    ProxyPass http://jellyfin:8096/jellyfin/static
    ProxyPassReverse http://jellyfin:8096/jellyfin/static
</Location>

<Location /jellyfin/web>
    ProxyPass http://jellyfin:8096/jellyfin/web
    ProxyPassReverse http://jellyfin:8096/jellyfin/web
</Location>
