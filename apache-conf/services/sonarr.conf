# Sonarr Reverse Proxy Configuration
<Location /sonarr>
    ProxyPass http://sonarr:8989/sonarr
    ProxyPassReverse http://sonarr:8989/sonarr
    
    # Sonarr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /sonarr/api>
    ProxyPass http://sonarr:8989/sonarr/api
    ProxyPassReverse http://sonarr:8989/sonarr/api
</Location>

<Location /sonarr/login>
    ProxyPass http://sonarr:8989/sonarr/login
    ProxyPassReverse http://sonarr:8989/sonarr/login
</Location>

# WebSocket support for real-time updates
<Location /sonarr/signalr>
    ProxyPass ws://sonarr:8989/sonarr/signalr
    ProxyPassReverse ws://sonarr:8989/sonarr/signalr
</Location>
