# Transmission Reverse Proxy Configuration
<Location /transmission>
    ProxyPass http://transmission:6969/transmission
    ProxyPassReverse http://transmission:6969/transmission
    
    # Transmission-specific settings
    ProxyTimeout 300
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /transmission/api>
    ProxyPass http://transmission:6969/transmission/api
    ProxyPassReverse http://transmission:6969/transmission/api
</Location>

<Location /transmission/rpc>
    ProxyPass http://transmission:6969/transmission/rpc
    ProxyPassReverse http://transmission:6969/transmission/rpc
</Location>
