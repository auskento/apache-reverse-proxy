# Overseerr Reverse Proxy Configuration
<Location /overseerr>
    ProxyPass http://overseerr:5055/overseerr
    ProxyPassReverse http://overseerr:5055/overseerr
    
    # Overseerr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /overseerr/api>
    ProxyPass http://overseerr:5055/overseerr/api
    ProxyPassReverse http://overseerr:5055/overseerr/api
</Location>

# WebSocket support for real-time updates
<Location /overseerr/socket.io>
    ProxyPass ws://overseerr:5055/overseerr/socket.io
    ProxyPassReverse ws://overseerr:5055/overseerr/socket.io
</Location>
