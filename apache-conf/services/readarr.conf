# Readarr Reverse Proxy Configuration
<Location /readarr>
    ProxyPass http://readarr:8787/readarr
    ProxyPassReverse http://readarr:8787/readarr
    
    # Readarr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /readarr/api>
    ProxyPass http://readarr:8787/readarr/api
    ProxyPassReverse http://readarr:8787/readarr/api
</Location>

# WebSocket support for real-time updates
<Location /readarr/signalr>
    ProxyPass ws://readarr:8787/readarr/signalr
    ProxyPassReverse ws://readarr:8787/readarr/signalr
</Location>
