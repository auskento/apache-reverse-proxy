# Whisparr Reverse Proxy Configuration
<Location /whisparr>
    ProxyPass http://whisparr:6969/whisparr
    ProxyPassReverse http://whisparr:6969/whisparr
    
    # Whisparr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /whisparr/api>
    ProxyPass http://whisparr:6969/whisparr/api
    ProxyPassReverse http://whisparr:6969/whisparr/api
</Location>

<Location /whisparr/login>
    ProxyPass http://whisparr:6969/whisparr/login
    ProxyPassReverse http://whisparr:6969/whisparr/login
</Location>

# WebSocket support for real-time updates
<Location /whisparr/signalr>
    ProxyPass ws://whisparr:6969/whisparr/signalr
    ProxyPassReverse ws://whisparr:6969/whisparr/signalr
</Location>
