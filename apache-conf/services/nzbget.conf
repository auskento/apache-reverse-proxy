# NZBGet combined files - direct proxy to root
<Location /nzbget/combined.js>
    ProxyPass http://nzbget:6789/combined.js nocanon
    ProxyPassReverse http://nzbget:6789/combined.js
</Location>

<Location /nzbget/combined.css>
    ProxyPass http://nzbget:6789/combined.css nocanon
    ProxyPassReverse http://nzbget:6789/combined.css
</Location>

<Location /nzbget>
    # NZBGet authentication headers (generated by generate-config.sh if NZBGET_USER is set)
    @@NZBGET_AUTH_HEADER@@

    # NZBGet reverse proxy configuration (following NZBGet's official documentation)
    ProxyPass http://nzbget:6789/ nocanon
    ProxyPassReverse http://nzbget:6789/
    ProxyPreserveHost On

    # NZBGet headers - tell app it's being served under /nzbget/
    RequestHeader set X-Script-Name "/nzbget"
    RequestHeader set X-Script-Root "/nzbget"
    RequestHeader set X-Forwarded-Base "/nzbget/"

    # Standard headers
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
</Location>
