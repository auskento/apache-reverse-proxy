<Location /nzbget>
    ProxyPass http://nzbget:6789/ connectiontimeout=300 timeout=300
    ProxyPassReverse http://nzbget:6789/
    ProxyPassReverseCookieDomain nzbget localhost
    ProxyPassReverseCookiePath / /nzbget/
    RequestHeader set X-Forwarded-Base "/nzbget/"

    # NZBGet headers
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    ProxyPreserveHost On

    # Enable WebSocket if needed
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/nzbget/(.*)$ "ws://nzbget:6789/$1" [P,L]
</Location>
