# Emby Reverse Proxy Configuration
<Location /emby>
    ProxyPass http://emby:8096/emby
    ProxyPassReverse http://emby:8096/emby
    
    # Emby-specific settings
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    
    # Required for video streaming
</Location>

<Location /emby/socket.io>
    ProxyPass ws://emby:8096/emby/socket.io
    ProxyPassReverse ws://emby:8096/emby/socket.io
</Location>

<Location /emby/static>
    ProxyPass http://emby:8096/emby/static
    ProxyPassReverse http://emby:8096/emby/static
</Location>
