# Plex Reverse Proxy Configuration
<Location /plex>
    ProxyPass http://plex:32400/plex
    ProxyPassReverse http://plex:32400/plex
    
    # Headers for proper operation
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
    
    # Required for video streaming
</Location>

<Location /plex/web>
    ProxyPass http://plex:32400/plex/web
    ProxyPassReverse http://plex:32400/plex/web
</Location>
