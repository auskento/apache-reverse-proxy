# Lidarr Reverse Proxy Configuration
<Location /lidarr>
    ProxyPass http://lidarr:8686/lidarr
    ProxyPassReverse http://lidarr:8686/lidarr
    
    # Lidarr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /lidarr/api>
    ProxyPass http://lidarr:8686/lidarr/api
    ProxyPassReverse http://lidarr:8686/lidarr/api
</Location>

# WebSocket support for real-time updates
<Location /lidarr/signalr>
    ProxyPass ws://lidarr:8686/lidarr/signalr
    ProxyPassReverse ws://lidarr:8686/lidarr/signalr
</Location>
