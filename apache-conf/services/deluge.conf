<Location /deluge>
    ProxyPass http://deluge:8112/ connectiontimeout=300 timeout=300
    ProxyPassReverse http://deluge:8112/
    
    # Deluge headers
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    
    # Enable WebSocket for Deluge
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/deluge/(.*)$ "ws://deluge:8112/$1" [P,L]
</Location>
