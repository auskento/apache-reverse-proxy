# Radarr Reverse Proxy Configuration
<Location /radarr>
    ProxyPass http://radarr:7878/radarr
    ProxyPassReverse http://radarr:7878/radarr
    
    # Radarr-specific settings
    ProxyTimeout 300
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /radarr/api>
    ProxyPass http://radarr:7878/radarr/api
    ProxyPassReverse http://radarr:7878/radarr/api
</Location>

<Location /radarr/login>
    ProxyPass http://radarr:7878/radarr/login
    ProxyPassReverse http://radarr:7878/radarr/login
</Location>

# WebSocket support for real-time updates
<Location /radarr/signalr>
    ProxyPass ws://radarr:7878/radarr/signalr
    ProxyPassReverse ws://radarr:7878/radarr/signalr
</Location>
