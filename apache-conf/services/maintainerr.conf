# Maintainerr Reverse Proxy Configuration

<Location /maintainerr>
    ProxyPass http://maintainerr:6246/maintainerr retry=0 connectiontimeout=5 timeout=300 keepalive=on
    ProxyPassReverse http://maintainerr:6246/maintainerr
    ProxyPreserveHost On

    # Standard proxy headers
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Script-Name "/maintainerr"
    RequestHeader set X-Forwarded-Prefix "/maintainerr"

    # WebSocket support via mod_proxy_wstunnel
    RequestHeader set Upgrade %{HTTP:Upgrade}e
    RequestHeader set Connection %{HTTP:Connection}e
</Location>
