# Maintainerr Reverse Proxy Configuration

<Location /maintainerr/>
    ProxyPass @@MAINTAINERR_URL@@/ retry=0 connectiontimeout=5 timeout=30 keepalive=on
    ProxyPassReverse @@MAINTAINERR_URL@@/
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Script-Name "/maintainerr"
    RequestHeader set X-Forwarded-Prefix "/maintainerr"

    # Path rewriting for assets and API calls
    AddOutputFilterByType INFLATE;SUBSTITUTE text/html application/javascript application/json
    SubstituteMaxLineLength 2000K
    Substitute "s|href=\"/|href=\"/maintainerr/|inq"
    Substitute "s|src=\"/|src=\"/maintainerr/|inq"
    Substitute "s|/api/|/maintainerr/api/|inq"
</Location>
