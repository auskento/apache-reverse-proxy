# Basic Authentication Configuration
# Single auth realm at root level - credentials cached for all paths
# Excludes only health checks and static assets

<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>

# Exclude specific paths from auth
<LocationMatch "^/(health|icons)">
    AuthType None
    Require all granted
</LocationMatch>
