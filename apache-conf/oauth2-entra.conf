# Entra ID (Azure AD) OpenID Connect Configuration for Apache
# This configuration enables Microsoft Entra authentication for all proxied services

# Session Configuration for OIDC
OIDCSessionType server-cache

# Client Configuration - Provided via environment variables
OIDCClientID @@ENTRA_CLIENT_ID@@
OIDCClientSecret @@ENTRA_CLIENT_SECRET@@
OIDCRedirectURI @@ENTRA_REDIRECT_URI@@

# Entra ID Configuration - use tenant-specific endpoint
# Provide ENTRA_PROVIDER_METADATA_URL (e.g., https://login.microsoftonline.com/YOUR_TENANT/v2.0/.well-known/openid-configuration)
OIDCProviderMetadataURL @@ENTRA_PROVIDER_METADATA_URL@@

# Scopes - what information to request from Entra ID
OIDCScope "openid profile email"

# Session configuration
OIDCSessionInactivityTimeout 3600
OIDCSessionMaxDuration 86400

# Claim configuration
OIDCClaimPrefix OIDC_
OIDCPassClaimsAs environment

# Encryption
OIDCCryptoPassphrase "@@ENTRA_CRYPTO_PASSPHRASE@@"

# Info logging - set to DEBUG for troubleshooting
# OIDCDebug Off

# Validate SSL certificates (recommended for production)
OIDCSSLValidateServer On

# Claim settings - customize which claims are passed as headers
OIDCClaimDelimiter ;
OIDCPassUserInfoAs json

# Session cookie settings - use wildcard domain for subdomains
OIDCCookieDomain @@COOKIE_DOMAIN@@
OIDCSessionCookiePath /
OIDCSessionCookieHTTPOnly On
OIDCSessionCookieSecure On
OIDCSessionCookieSameSite "Lax"
