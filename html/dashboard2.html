<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Server Dashboard</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;width:100%}
  body{background:#08090c;overflow:hidden}
  ::-webkit-scrollbar{width:9px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:9px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.16)}
  @keyframes floatGlow{0%,100%{opacity:.55}50%{opacity:.95}}
</style>
</helmet>

<div style="display:flex;height:100vh;width:100vw;font-family:system-ui,sans-serif;color:#e9ecf2;background:radial-gradient(1200px 700px at 18% -10%,rgba(58,160,224,.10),transparent 60%),radial-gradient(900px 600px at 100% 110%,rgba(46,205,111,.07),transparent 55%),#08090c;overflow:hidden;align-items:center;justify-content:center">

  <aside style="display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 30px;max-height:100%;overflow-y:auto">

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#3aa0e0,#2ecd6f);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(58,160,224,.4)">
        <div style="width:18px;height:18px;border:3px solid #08090c;border-radius:5px"></div>
      </div>
      <div style="text-align:center">
        <div style="font-size:13px;color:#6b7385;letter-spacing:.08em">MEDIA</div>
      </div>
    </div>

    <nav style="display:flex;flex-direction:column;gap:20px;align-items:center">
      <sc-for list="{{ services }}" as="app">
        <button onClick="{{ app.open }}" title="{{ app.name }}" style="cursor:pointer;border:0;padding:0;background:transparent;transition:transform .2s,filter .2s;border-radius:14px" style-hover="transform:scale(1.1);filter:brightness(1.3)">
          <span style="width:60px;height:60px;flex:none;border-radius:14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);transition:box-shadow .2s;border:2px solid transparent" style-hover="{{ app.glowStyle }}">
            {{ app.iconEl }}
          </span>
        </button>
      </sc-for>
    </nav>

    <div style="width:1px;height:20px;background:rgba(255,255,255,.1)"></div>

    <div style="text-align:center;font-size:11px;color:#5d6575">
      <span style="display:block;width:8px;height:8px;border-radius:50%;background:#2ecd6f;margin:0 auto 6px;box-shadow:0 0 8px #2ecd6f;animation:floatGlow 2.6s ease-in-out infinite"></span>
      Online
    </div>

  </aside>

  <main style="flex:1;min-width:0;position:relative">
    <iframe name="Main" ref="{{ frameRef }}" title="App" style="position:absolute;inset:0;width:100%;height:100%;border:0;background:#0b0d11"></iframe>

    <sc-if value="{{ showWelcome }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:radial-gradient(900px 600px at 50% 30%,rgba(58,160,224,.08),transparent 60%),#0b0d11">
        <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#3aa0e0,#2ecd6f);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(58,160,224,.35);margin-bottom:26px">
          <div style="width:22px;height:22px;border:3px solid #0b0d11;border-radius:6px"></div>
        </div>
        <div style="font-weight:600;font-size:27px;color:#f4f6fa;letter-spacing:-.01em">Welcome</div>
        <div style="font-size:15px;color:#828b9c;margin-top:10px;max-width:380px;line-height:1.55">Click an icon to open a service</div>
      </div>
    </sc-if>
  </main>
</div>
</x-dc>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { activeId: null, showWelcome: true };

  navigate(app) {
    if (app.popup) {
      window.open(app.href, app.name, 'resizable=no,status=no,location=no,toolbar=no,menubar=no,scrollbars=no');
      return;
    }
    this.setState({ activeId: app.id, showWelcome: false });
    if (this._frame) this._frame.src = app.href;
  }

  renderVals() {
    const raw = [
      { id: 'plex', name: 'Plex', icon: '/icons/plex.png', href: 'https://app.plex.tv', accent: '#e5a00d', popup: true },
      { id: 'radarr', name: 'Radarr', icon: '/icons/radarr.png', href: '/radarr/', accent: '#febc2e' },
      { id: 'sonarr', name: 'Sonarr', icon: '/icons/sonarr.png', href: '/sonarr/calendar', accent: '#3aa0e0' },
      { id: 'lidarr', name: 'Lidarr', icon: '/icons/lidarr.png', href: '/lidarr/', accent: '#2ecd6f' },
      { id: 'whisparr', name: 'Whisparr', icon: '/icons/whisparr.png', href: '/whisparr/', accent: '#ef7e30' },
      { id: 'sabnzbd', name: 'SABnzbd', icon: '/icons/sabnzbd.png', href: '/sabnzbd/', accent: '#f5c20f' },
      { id: 'deluge', name: 'Deluge', icon: '/icons/deluge.png', href: '/deluge/', accent: '#3aa3e0' },
      { id: 'transmission', name: 'Transmission', icon: '/icons/transmission.png', href: '/transmission/', accent: '#6b93d6' },
      { id: 'qbittorrent', name: 'qBittorrent', icon: '/icons/qbittorrent.png', href: '/qbittorrent/', accent: '#3daae3' },
      { id: 'prowlarr', name: 'Prowlarr', icon: '/icons/prowlarr.png', href: '/prowlarr/', accent: '#e8810e' },
      { id: 'seerr', name: 'Seerr', icon: '/icons/seerr.png', href: '/seerr/', accent: '#00d4ff' },
      { id: 'emby', name: 'Emby', icon: '/icons/emby.png', href: '/emby/', accent: '#9d56e0' },
      { id: 'jellyfin', name: 'Jellyfin', icon: '/icons/jellyfin.png', href: '/jellyfin/', accent: '#00a4dc' },
      { id: 'tautulli', name: 'Tautulli', icon: '/icons/tautulli.png', href: '/tautulli/', accent: '#ffa41c' },
    ];

    const mk = (app) => {
      const active = this.state.activeId === app.id;
      return {
        ...app,
        open: () => this.navigate(app),
        iconEl: React.createElement('img', { src: app.icon, alt: app.name, style: { width: 40, height: 40, objectFit: 'contain' } }),
        glowStyle: `box-shadow:inset 0 0 0 2px ${app.accent}, 0 0 16px ${app.accent}66`,
      };
    };

    const services = raw.map(mk);

    return {
      services,
      showWelcome: this.state.showWelcome,
      frameRef: (el) => { this._frame = el; },
    };
  }
}
</script>

<script src="support.js"></script>
</body>
</html>
